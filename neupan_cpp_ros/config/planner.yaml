# mpc
receding: 10
step_time: 0.1
ref_speed: 4.0
collision_threshold: 0.1

# robot
robot:
  kinematics: 'diff'
  max_speed: [8.0, 1.0]
  max_acce: [8.0, 3.0]
  length: 1.6
  width: 2.0

# initial path
ipath:
  # waypoints: [[0, 20, 0], [60, 20, 0]]
  curve_style: 'line'
  loop: False
  arrive_threshold: 0.1
  close_threshold: 0.1
  ind_range: 10
  arrive_index_threshold: 1

pan:
  iter_num: 2
  dune_max_num: 100
  nrmp_max_num: 10
  iter_threshold: 0.1

# adjust parameters
adjust:
  q_s: 1.0
  p_u: 1.0
  eta: 15.0
  d_max: 1.0
  d_min: 0.1
  ro_obs: 10.0
  bk: 0.0
